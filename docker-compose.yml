version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: logadvisor
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  chroma:
    image: chromadb/chroma:0.4.24
    ports:
      - "8001:8000"

volumes:
  pgdata: